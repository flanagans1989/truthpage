services:
  - type: web
    name: trustpages
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /healthz
    # NOT: preDeployCommand free planda ÇALIŞMAZ (sessizce yok sayılır).
    # Migration'lar Dockerfile CMD içinde container açılışında koşuyor.
    envVars:
      # ── Zorunlu (Render dashboard'dan doldur) ───────────────────────────
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: PADDLE_API_KEY
        sync: false
      - key: PADDLE_CLIENT_TOKEN
        sync: false
      - key: PADDLE_WEBHOOK_SECRET
        sync: false

      # ── Uygulama URL'i (deploy sonrası Render'ın verdiği URL ile güncelle) ──
      - key: APP_URL
        sync: false

      # ── Varsayılan değerleri olan opsiyonel değişkenler ──────────────────
      - key: RESEND_FROM_EMAIL
        value: TrustPages <onboarding@resend.dev>
      - key: PADDLE_PRICE_ID_GROWTH
        sync: false
      - key: PADDLE_ENVIRONMENT
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/playwright-browsers
      - key: PYTHONUNBUFFERED
        value: "1"
      # - key: SENTRY_DSN
      #   sync: false
