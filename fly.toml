# fly.toml — TrustPages production configuration
# Deploy with: fly deploy
app = "trustpages"
primary_region = "fra"   # Frankfurt — closest to Antalya

[build]
  dockerfile = "Dockerfile"

[env]
  PORT            = "8000"
  PYTHONUNBUFFERED = "1"
  PLAYWRIGHT_BROWSERS_PATH = "/opt/playwright-browsers"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/healthz"
    timeout      = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "1gb"
