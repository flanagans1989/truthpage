<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TrustPages{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}TrustPages monitors your vendors' sub-processor lists and privacy policies, classifies every change, and publishes an auditable public trust page for your customers.{% endblock %}">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta property="og:site_name" content="TrustPages">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ self.title() }}">
    <meta property="og:description" content="{{ self.meta_description() }}">
    <meta property="og:image" content="https://usetrustpages.com/static/img/og.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="/static/tailwind.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
    {% block content %}{% endblock %}
</body>
</html>
