{% if status == "sent" %}
<div class="bg-green-50 border border-green-200 rounded-xl p-5 text-center">
    <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-3">
        <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
    </div>
    <p class="text-sm font-semibold text-green-800 mb-1">Check your inbox!</p>
    <p class="text-xs text-green-600 leading-relaxed">
        A confirmation link has been sent to your email.<br>
        Click it to complete your subscription.
    </p>
</div>
{% elif status == "already_confirmed" %}
<div class="bg-blue-50 border border-blue-200 rounded-xl p-5 text-center">
    <p class="text-sm font-semibold text-blue-800 mb-1">Already subscribed</p>
    <p class="text-xs text-blue-600">This email address is already confirmed and active.</p>
</div>
{% endif %}
